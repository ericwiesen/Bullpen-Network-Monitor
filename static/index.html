<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Network Monitor</title>
  <style>
    * { box-sizing: border-box; }
    body { font-family: system-ui, sans-serif; max-width: 720px; margin: 0 auto; padding: 1.5rem; }
    h1 { margin-top: 0; }
    section { margin-bottom: 1.5rem; }
    label { display: block; margin-bottom: 0.25rem; font-weight: 500; }
    input[type="text"], select { padding: 0.5rem; width: 100%; max-width: 320px; }
    .context-input { max-width: 480px; color: #555; font-size: 0.9rem; }
    .context-label { font-size: 0.85rem; color: #666; font-weight: normal; margin-top: 0.5rem; margin-bottom: 0.25rem; }
    button { padding: 0.5rem 1rem; cursor: pointer; margin-right: 0.5rem; margin-top: 0.5rem; }
    button:disabled { opacity: 0.6; cursor: not-allowed; }
    ul { list-style: none; padding: 0; }
    li { padding: 0.5rem 0; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; align-items: flex-start; gap: 0.5rem; }
    li span { flex: 1; min-width: 0; }
    .entity-context { font-size: 0.85rem; color: #888; font-style: italic; margin-top: 0.1rem; }
    .entity-desc { font-size: 0.9rem; color: #555; margin-top: 0.25rem; line-height: 1.35; }
    .entity-link { font-size: 0.85rem; margin-left: 0.25rem; }
    .output { background: #f5f5f5; border: 1px solid #ddd; border-radius: 8px; padding: 1rem; min-height: 200px; max-height: 60vh; overflow-y: auto; }
    .output.empty { color: #888; }
    .output .item { margin-bottom: 1rem; padding-bottom: 1rem; border-bottom: 1px solid #eee; }
    .output .item:last-child { border-bottom: none; margin-bottom: 0; padding-bottom: 0; }
    .output a { color: #06c; }
    .output .meta { font-size: 0.85rem; color: #666; margin-top: 0.25rem; }
    .output .last-run-note { font-size: 0.8rem; color: #999; margin-bottom: 0.75rem; }
    .error { color: #c00; }
    .row { display: flex; gap: 0.5rem; align-items: flex-end; flex-wrap: wrap; }
  </style>
</head>
<body>
  <h1>Network Monitor</h1>
  <p>Add people and companies, then click Run to fetch recent news.</p>

  <section>
    <label>Add person or company</label>
    <div class="row">
      <input type="text" id="name" placeholder="e.g. Acme Corp or Jane Smith" />
      <select id="type">
        <option value="company">Company</option>
        <option value="person">Person</option>
      </select>
    </div>
    <div id="urlRow">
      <div class="context-label">Website URL <span style="font-weight:normal;color:#aaa">(required)</span></div>
      <input type="text" id="url" class="context-input" placeholder="e.g. https://avantstay.com" />
    </div>
    <div id="contextRow" style="display:none">
      <div class="context-label">Context <span style="font-weight:normal;color:#aaa">(optional — helps with common names)</span></div>
      <input type="text" id="context" class="context-input" placeholder="e.g. CEO of Meridian Capital, based in Chicago" />
    </div>
    <div><button type="button" id="addBtn">Add</button></div>
  </section>

  <section>
    <label>People & companies to monitor</label>
    <ul id="list"></ul>
  </section>

  <section>
    <button type="button" id="runBtn">Run</button>
    <span id="status"></span>
  </section>

  <section>
    <label>Output</label>
    <div class="output empty" id="output">Click Run to fetch results. Results will appear here.</div>
  </section>

  <script>
    const nameInput = document.getElementById('name');
    const typeSelect = document.getElementById('type');
    const contextInput = document.getElementById('context');
    const urlInput = document.getElementById('url');
    const urlRow = document.getElementById('urlRow');
    const contextRow = document.getElementById('contextRow');
    const addBtn = document.getElementById('addBtn');

    typeSelect.addEventListener('change', () => {
      const isCompany = typeSelect.value === 'company';
      urlRow.style.display = isCompany ? '' : 'none';
      contextRow.style.display = isCompany ? 'none' : '';
    });
    const listEl = document.getElementById('list');
    const runBtn = document.getElementById('runBtn');
    const statusEl = document.getElementById('status');
    const outputEl = document.getElementById('output');

    function api(path, options = {}) {
      return fetch(path, { headers: { 'Content-Type': 'application/json' }, ...options }).then(async r => {
        const body = r.status === 204 ? null : await r.json().catch(() => ({}));
        if (!r.ok) throw new Error(body?.detail || body?.message || r.statusText);
        return body;
      });
    }

    function esc(s) { return (s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/"/g,'&quot;'); }

    function renderResults(results, note) {
      if (!results || results.length === 0) {
        outputEl.innerHTML = 'No results found.';
        outputEl.className = 'output empty';
        return;
      }
      const noteHtml = note ? `<div class="last-run-note">${esc(note)}</div>` : '';
      outputEl.className = 'output';
      outputEl.innerHTML = noteHtml + results.map(r => `
        <div class="item">
          <strong>${esc(r.entity_name)}</strong><br />
          <a href="${esc(r.url)}" target="_blank" rel="noreferrer">${esc(r.title)}</a>
          <div class="meta">${esc(r.source || '')}${r.snippet ? ' · ' + esc(r.snippet) : ''}</div>
        </div>
      `).join('');
    }

    function loadEntities() {
      api('/api/entities').then(entities => {
        listEl.innerHTML = entities.length === 0
          ? '<li style="color:#888">None yet. Add one above.</li>'
          : entities.map(e => {
              const ctx = e.context ? `<div class="entity-context">${esc(e.context)}</div>` : '';
              const desc = e.description ? `<div class="entity-desc">${esc(e.description)}</div>` : '';
              const link = e.url ? `<a href="${esc(e.url)}" target="_blank" rel="noreferrer" class="entity-link">Info ↗</a>` : '';
              return `<li><span><strong>${esc(e.name)}</strong> <small>(${e.type})</small> ${link}${ctx}${desc}</span><button type="button" data-id="${e.id}" class="delBtn">Remove</button></li>`;
            }).join('');
        listEl.querySelectorAll('.delBtn').forEach(btn => {
          btn.onclick = () => api(`/api/entities/${btn.dataset.id}`, { method: 'DELETE' }).then(loadEntities);
        });
      }).catch(() => { statusEl.textContent = 'Error loading list'; statusEl.className = 'error'; });
    }

    function loadLastRun() {
      api('/api/last-run').then(data => {
        if (data.run_id && data.results && data.results.length > 0) {
          const d = data.created_at ? new Date(data.created_at).toLocaleString() : '';
          renderResults(data.results, `Last run: ${d}`);
        }
      }).catch(() => {});
    }

    addBtn.onclick = () => {
      const name = nameInput.value.trim();
      if (!name) return;
      const isCompany = typeSelect.value === 'company';
      const url = isCompany ? (urlInput.value.trim() || null) : null;
      const context = !isCompany ? (contextInput.value.trim() || null) : null;
      if (isCompany && !url) { statusEl.textContent = 'Please enter the company URL.'; statusEl.className = 'error'; return; }
      addBtn.disabled = true;
      statusEl.textContent = isCompany ? 'Adding…' : 'Adding and looking up…';
      statusEl.className = '';
      api('/api/entities', { method: 'POST', body: JSON.stringify({ name, type: typeSelect.value, context, url }) })
        .then(() => { nameInput.value = ''; urlInput.value = ''; contextInput.value = ''; statusEl.textContent = ''; loadEntities(); })
        .catch(err => { statusEl.textContent = 'Add failed: ' + (err.message || 'check console'); statusEl.className = 'error'; })
        .finally(() => { addBtn.disabled = false; });
    };

    nameInput.addEventListener('keydown', e => { if (e.key === 'Enter') addBtn.click(); });

    runBtn.onclick = () => {
      runBtn.disabled = true;
      statusEl.textContent = 'Running…';
      statusEl.className = '';
      outputEl.textContent = 'Running… this may take a few seconds.';
      outputEl.className = 'output';
      api('/api/run', { method: 'POST' })
        .then(results => {
          statusEl.textContent = 'Done.';
          if (results.length === 0) {
            outputEl.innerHTML = 'No results (add some people/companies first).';
            outputEl.className = 'output empty';
          } else {
            renderResults(results, null);
          }
        })
        .catch(err => {
          statusEl.textContent = 'Run failed';
          statusEl.className = 'error';
          outputEl.textContent = 'Run failed: ' + err.message;
          outputEl.className = 'output error';
        })
        .finally(() => { runBtn.disabled = false; });
    };

    loadEntities();
    loadLastRun();
  </script>
</body>
</html>
